<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title & logo -->
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- DaisyUI & Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Connect with CSS file  -->
    <link rel="stylesheet" href="styles/style.css">
</head>

<body class="bg-[#F8FAFC]">
    <!-- Navbar section  -->
    <header class="px-20 shadow-sm">
        <div class="navbar bg-white ">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <input id="input-search" type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />

                <button id="btn-search" class="btn btn-primary">Search</button>
                <button class="btn btn-primary">+ New issues</button>
            </div>
        </div>
    </header>


    <!-- issue showing Button  section  -->
    <section class="w-11/12 bg-white shadow-sm mt-20 mx-auto p-6 ">
        <div id="filter-button" class=" ">
            <button onclick="loadIssues()" class="btn btn-outline btn-primary px-9 py-3 mr-2 active">All</button>
            <button onclick="filterIssues('open')" class="btn btn-outline btn-primary px-9 py-3 mr-2">Open</button>
            <button onclick="filterIssues('closed')" class="btn btn-outline btn-primary px-9 py-3 mr-2">Closed</button>
        </div>
    </section>
    <section id="issue-counter" class="bg-[#F8FAFC] p-10 w-11/12 mx-auto my-10 flex justify-between ">
        <div class="flex justify-between w-full bg-white p-6 shadow-sm">
            <div class="flex gap-2">
                <img class="w-[50px] h-[50px]" src="assets/Aperture.png" alt="">
                <div>
                    <h2 id="issue-count" class="font-bold text-[20px]">50 Issues</h2>
                    <p>Track and manage your project issues</p>
                </div>
            </div>
            <div class=" flex items-center space-x-2">
                <img class="w-3 h-3" src="assets/Ellipse 2.png" alt="">
                <p>Open</p>
                <img class="w-3 h-3" src="assets/Ellipse 2 (1).png" alt="">
                <p>Closed</p>
            </div>
        </div>



    </section>


    <section id="spinner" class="flex justify-center items-center hidden">
        <span class="loading loading-spinner text-primary"></span>
    </section>
    <section id="issue-container" class="bg-[#F8FAFC] p-10 w-11/12 mx-auto my-10 grid grid-cols-4 gap-5 ">



    </section>



    <dialog id="issue_modal" class="modal modal-bottom sm:modal-middle">
        <div class="modal-box">
            <div id="details-container" class="space-y-5">
                
            </div>
            <div class="modal-action">
                <form method="dialog">
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>



    <script src="script/index.js"></script>
</body>

</html>
