<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Title & logo -->
    <title>GitHub Issues Tracker</title>
    <link rel="shortcut icon" href="assets/github-logo.png" type="image/x-icon">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">


    <!-- DaisyUI & Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Connect with CSS file  -->
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <!-- Navbar section  -->
    <header class="px-20 shadow-sm">
        <div class="navbar bg-white ">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl">GitHub Issues Tracker</a>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Search issues..." class="input input-bordered w-24 md:w-auto" />

                <button class="btn btn-primary">Search</button>
                <button class="btn btn-primary">+ New issues</button>
                

                
            </div>
        </div>
    </header>

</body>

</html>
